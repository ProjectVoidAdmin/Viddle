<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
<title>Local AI Chat</title>
<style>
  :root{
    --bg:#14161a;
    --panel:#1c1f26;
    --bubble-user:#2e6f5e;
    --bubble-ai:#242832;
    --text:#e7e9ee;
    --muted:#8a8f9c;
    --accent:#5fd6a8;
    --danger:#d97757;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:var(--bg);color:var(--text);
    font-family:-apple-system,Roboto,Segoe UI,Helvetica,Arial,sans-serif;
    overflow:hidden;
    overscroll-behavior:none;
  }
  #app{
    display:flex;flex-direction:column;
    height:100vh;height:100dvh;
  }
  #statusBar{
    padding:10px 14px;
    font-size:12.5px;
    color:var(--muted);
    background:var(--panel);
    border-bottom:1px solid #262a33;
    display:flex;align-items:center;gap:8px;
    flex-shrink:0;
  }
  #statusDot{
    width:8px;height:8px;border-radius:50%;
    background:var(--danger);
    flex-shrink:0;
    transition:background .3s;
  }
  #statusDot.ready{background:var(--accent);}
  #statusDot.loading{background:#e0b84c;animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  #progressWrap{
    flex-shrink:0;height:3px;background:#262a33;
  }
  #progressBar{
    height:100%;width:0%;background:var(--accent);
    transition:width .2s;
  }
  #messages{
    flex:1;overflow-y:auto;
    min-height:0;
    overscroll-behavior-y:contain;
    padding:16px 12px 8px;
    display:flex;flex-direction:column;gap:10px;
    -webkit-overflow-scrolling:touch;
  }
  .msg{
    max-width:82%;
    padding:10px 13px;
    border-radius:14px;
    font-size:15px;
    line-height:1.42;
    white-space:pre-wrap;
    word-wrap:break-word;
  }
  .msg.user{
    align-self:flex-end;
    background:var(--bubble-user);
    border-bottom-right-radius:4px;
  }
  .msg.ai{
    align-self:flex-start;
    background:var(--bubble-ai);
    border-bottom-left-radius:4px;
  }
  .msg.system{
    align-self:center;
    background:transparent;
    color:var(--muted);
    font-size:13px;
    text-align:center;
    max-width:90%;
  }
  #inputBar{
    flex-shrink:0;
    display:flex;gap:8px;
    padding:10px 10px calc(10px + env(safe-area-inset-bottom));
    background:var(--panel);
    border-top:1px solid #262a33;
  }
  #inputField{
    flex:1;
    background:#12141a;
    border:1px solid #2c303a;
    border-radius:20px;
    padding:10px 16px;
    color:var(--text);
    font-size:15px;
    outline:none;
    resize:none;
    max-height:100px;
  }
  #sendBtn{
    background:var(--accent);
    color:#0d1310;
    border:none;
    border-radius:20px;
    padding:0 18px;
    font-size:15px;
    font-weight:600;
    flex-shrink:0;
  }
  #sendBtn:disabled{
    background:#3a3f4a;
    color:var(--muted);
  }
  #loadingOverlay{
    position:fixed;inset:0;
    background:var(--bg);
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:18px;
    z-index:10;
    padding:24px;
    text-align:center;
  }
  #loadingOverlay.hidden{display:none;}
  #loadingTitle{
    font-size:22px;font-weight:700;
    letter-spacing:.3px;
  }
  #loadingSpinner{
    width:36px;height:36px;
    border:3px solid #2c303a;
    border-top-color:var(--accent);
    border-radius:50%;
    animation:spin .9s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  #loadingPct{
    font-size:15px;font-weight:600;
    color:var(--accent);
    min-height:20px;
  }
  #loadingDetail{
    font-size:12.5px;
    color:var(--muted);
    max-width:280px;
    min-height:16px;
  }
  #loadingBarWrap{
    width:240px;height:6px;
    background:#262a33;
    border-radius:3px;
    overflow:hidden;
  }
  #loadingBarFill{
    height:100%;width:0%;
    background:var(--accent);
    transition:width .2s;
  }
  #dataWarning{
    background:var(--panel);
    border:1px solid #2c303a;
    border-radius:14px;
    padding:18px;
    max-width:300px;
  }
  #dataWarning p{
    font-size:13.5px;color:var(--text);
    margin:0 0 14px;line-height:1.5;
  }
  #dataWarning .btnRow{
    display:flex;gap:10px;
  }
  #dataWarning button{
    flex:1;
    border:none;border-radius:10px;
    padding:10px;font-size:14px;font-weight:600;
  }
  #continueBtn{background:var(--accent);color:#0d1310;}
  #cancelBtn{background:#2c303a;color:var(--text);}
</style>
</head>
<body>
<div id="app">
  <div id="loadingOverlay">
    <div id="loadingTitle">Viddle AI</div>
    <div id="loadingSpinner"></div>
    <div id="loadingPct"></div>
    <div id="loadingBarWrap"><div id="loadingBarFill"></div></div>
    <div id="loadingDetail">Starting up…</div>
  </div>
  <div id="statusBar">
    <div id="statusDot"></div>
    <span id="statusText">Starting up…</span>
  </div>
  <div id="progressWrap"><div id="progressBar"></div></div>
  <div id="messages"></div>
  <div id="inputBar">
    <textarea id="inputField" rows="1" placeholder="Loading model…" disabled></textarea>
    <button id="sendBtn" disabled>Send</button>
  </div>
</div>

<script type="module">
import * as webllm from "https://esm.run/@mlc-ai/web-llm";

const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const progressBar = document.getElementById('progressBar');
const messages = document.getElementById('messages');
const inputField = document.getElementById('inputField');
const sendBtn = document.getElementById('sendBtn');
const loadingOverlay = document.getElementById('loadingOverlay');
const loadingPct = document.getElementById('loadingPct');
const loadingBarFill = document.getElementById('loadingBarFill');
const loadingDetail = document.getElementById('loadingDetail');
const appEl = document.getElementById('app');

// Some Android browsers/WebViews don't reliably shrink 100dvh when the
// keyboard opens, leaving a gap above it. Track the real visible area
// via visualViewport and size #app to match exactly.
if (window.visualViewport) {
  const syncViewportHeight = () => {
    appEl.style.height = window.visualViewport.height + 'px';
  };
  window.visualViewport.addEventListener('resize', syncViewportHeight);
  window.visualViewport.addEventListener('scroll', syncViewportHeight);
  syncViewportHeight();
}

// Small model chosen for phone RAM/VRAM limits. Swap for a bigger one later if the device handles it.
// Pulls weights and WASM straight from MLC's own hosting — no bucket, no custom config needed.
const MODEL_ID = "Llama-3.2-1B-Instruct-q4f16_1-MLC";
// True hard ceiling — the final reply will never exceed this many
// characters. To still land on a complete sentence, we let raw generation
// run a bit past this internally (GENERATION_HEADROOM_CHARS) purely so we
// can detect the overshoot, then roll the visible reply back to the last
// sentence that finished *within* MAX_REPLY_CHARS — never past it.
const MAX_REPLY_CHARS = 500;
const GENERATION_HEADROOM_CHARS = 150;
// Llama's tokenizer averages roughly 4 characters per token for English
// text (varies with punctuation/rare words, but this is the standard rule
// of thumb). Deriving the token backstop from the char budget this way
// means they always move together — no more risk of one being looser than
// the other after a tweak to just one of them.
const CHARS_PER_TOKEN_ESTIMATE = 4;
const MAX_REPLY_TOKENS = Math.ceil((MAX_REPLY_CHARS + GENERATION_HEADROOM_CHARS) / CHARS_PER_TOKEN_ESTIMATE);

// Finds the end of the *last* complete sentence in `text` whose end index
// is at or before `maxLen` — i.e. the last '.', '!', '?', or '…'
// (optionally followed by a closing quote/paren) that's followed by
// whitespace or end-of-string, and still fits the budget. Returns -1 if no
// sentence completes within budget at all (e.g. one long run-on).
function findLastSentenceEndWithin(text, maxLen){
  const re = /[.!?…]["'”’)\]]?(?=\s|$)/g;
  let match, last = -1;
  while ((match = re.exec(text))) {
    const endIdx = match.index + match[0].length;
    if (endIdx > maxLen) break; // matches only move forward, so nothing further will fit either
    last = endIdx;
  }
  return last;
}

// Long-term memory: rather than resending the whole growing chat transcript
// every turn (which is what tanks performance on a 1B on-device model), we
// keep only the last RECENT_MESSAGES_TO_KEEP messages verbatim. Once history
// grows past CONDENSE_THRESHOLD, the older stuff gets distilled by the model
// itself into a short list of durable facts and dropped. The fact list is
// tiny and gets prepended as a system message on every request — but it
// lives only in memory for the current session, not persisted anywhere, so
// a reload or app restart starts with a clean slate.
const RECENT_MESSAGES_TO_KEEP = 6;   // ~3 user/AI turns kept verbatim
const CONDENSE_THRESHOLD = 10;       // condense once history exceeds this
const MAX_MEMORY_FACTS = 30;         // cap so the fact list itself can't grow forever

let engine = null;
let history = [];
let memoryFacts = [];
let isGenerating = false;
let isLoadingModel = false;
let isCondensingMemory = false;
let needsReloadOnResume = false;

// What actually gets sent to the model each turn: a brevity/completeness
// instruction, the distilled facts (if any), then only the recent messages
// — never the full history.
function buildRequestMessages(){
  const msgs = [{
    role: 'system',
    content: `Keep replies concise, ideally well under ${MAX_REPLY_CHARS} characters, and always finish as a complete, self-contained thought — never trail off mid-sentence.`
  }];
  if (memoryFacts.length) {
    msgs.push({
      role: 'system',
      content: 'Known facts to stay consistent with (don\'t restate them unprompted): ' + memoryFacts.join(' | ')
    });
  }
  return msgs.concat(history);
}

// Distills older messages into short durable facts, appends them to
// memoryFacts, and trims history down to the recent window. Runs in the
// background after a reply finishes; skipped if already running or if the
// engine isn't available.
async function condenseHistoryIfNeeded(){
  if (isCondensingMemory || !engine) return;
  if (history.length <= CONDENSE_THRESHOLD) return;

  isCondensingMemory = true;
  setStatus('Organizing memory…', 'loading');
  try {
    const older = history.slice(0, history.length - RECENT_MESSAGES_TO_KEEP);
    const transcript = older.map(m => (m.role === 'user' ? 'User: ' : 'AI: ') + m.content).join('\n');

    const res = await engine.chat.completions.create({
      messages: [
        {
          role: 'system',
          content: 'Extract only durable facts worth remembering long-term from this conversation snippet — names, preferences, decisions, ongoing goals. Reply with a single pipe-separated list, under 250 characters total, no commentary or extra text. If there is nothing durable, reply with exactly: NONE'
        },
        { role: 'user', content: transcript }
      ],
      stream: false,
      temperature: 0.2,
      max_tokens: 100,
    });

    const summary = (res.choices[0]?.message?.content || '').trim();
    if (summary && summary.toUpperCase() !== 'NONE') {
      summary.split('|').map(s => s.trim()).filter(Boolean).forEach(fact => {
        if (!memoryFacts.includes(fact)) memoryFacts.push(fact);
      });
      if (memoryFacts.length > MAX_MEMORY_FACTS) {
        memoryFacts = memoryFacts.slice(memoryFacts.length - MAX_MEMORY_FACTS);
      }
    }

    history = history.slice(history.length - RECENT_MESSAGES_TO_KEEP);
  } catch (e) {
    console.error('Memory condensation failed (non-fatal):', e);
  } finally {
    isCondensingMemory = false;
    setStatus('Ready — running fully offline', 'ready');
  }
}

function isNearBottom(){
  const threshold = 80;
  return messages.scrollHeight - messages.scrollTop - messages.clientHeight < threshold;
}

function scrollToBottom(force){
  if (force || isNearBottom()) {
    messages.scrollTop = messages.scrollHeight;
  }
}

function addMessage(role, text){
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  messages.appendChild(div);
  scrollToBottom(true);
  return div;
}

function setStatus(text, mode){
  statusText.textContent = text;
  statusDot.className = mode || '';
}

function showOverlay(){ loadingOverlay.classList.remove('hidden'); }
function hideOverlay(){ loadingOverlay.classList.add('hidden'); }

function updateLoadingUI(pct, detailText){
  loadingPct.textContent = pct + '%';
  loadingBarFill.style.width = pct + '%';
  loadingDetail.textContent = detailText || '';
  progressBar.style.width = pct + '%';
}

// Warn before pulling ~700MB on cellular. Skipped entirely if the model is
// already cached (checked separately) or if connection info isn't available.
function isOnCellular(){
  const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  if (!conn) return false;
  return conn.type === 'cellular' || /^[23]g|slow-2g/.test(conn.effectiveType || '');
}

function askToContinueOnCellular(){
  return new Promise((resolve) => {
    loadingDetail.innerHTML = '';
    const box = document.createElement('div');
    box.id = 'dataWarning';
    box.innerHTML = `
      <p>This model is about 700MB. You're on cellular data — downloading now may use a chunk of your data plan. Once downloaded, it's cached and works offline.</p>
      <div class="btnRow">
        <button id="cancelBtn">Wait for wifi</button>
        <button id="continueBtn">Continue anyway</button>
      </div>
    `;
    loadingDetail.appendChild(box);
    document.getElementById('continueBtn').onclick = () => resolve(true);
    document.getElementById('cancelBtn').onclick = () => resolve(false);
  });
}

// Hooks called by the App Inventor wrapper (TaifunTools1.ActivityStateChanged
// -> EvaluateJavaScript) whenever Android pauses/resumes the activity. This
// is what actually kills the GPU device mid-stream (screen lock, app
// switch, etc.) — by reacting here we interrupt cleanly *before* that
// happens instead of only cleaning up after a mapAsync crash.
window._pvNativePause = function(){
  if (!engine || !isGenerating) return;
  try { engine.interruptGenerate(); } catch (e) { /* best-effort */ }
  needsReloadOnResume = true;
};

window._pvNativeResume = function(){
  if (!needsReloadOnResume || isLoadingModel) return;
  needsReloadOnResume = false;
  addMessage('system', 'Paused mid-reply while backgrounded — reloading the model to be safe.');
  sendBtn.disabled = true;
  inputField.disabled = true;
  loadModel(true);
};

// Cache the page shell itself so Viddle can open even with no network
// connection — same idea as the model weights being cached, but for the
// HTML/JS that runs the app.
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch((e) => {
      console.log('Service worker registration failed:', e);
    });
  });
}

// Loads (or re-loads) the model. Shared by first launch and by the crash
// recovery path in sendMessage(), since both need the same engine-creation
// dance. `isRecovery` just changes the copy/UI a bit.
async function loadModel(isRecovery){
  isLoadingModel = true;
  try {
    return await loadModelInner(isRecovery);
  } finally {
    isLoadingModel = false;
  }
}

async function loadModelInner(isRecovery){
  showOverlay();

  if (!navigator.gpu) {
    setStatus('WebGPU not available in this WebView', '');
    loadingDetail.textContent = "This device/browser doesn't expose WebGPU, so the model can't run here.";
    loadingPct.textContent = '';
    return false;
  }

  if (!isRecovery) {
    // Android system WebView (used by the App Inventor wrapper) includes "; wv)"
    // in its user agent — regular Chrome does not. Use this to only request
    // persistent storage inside the wrapped app, leaving Chrome's cache temporary.
    const isWrappedWebView = /; wv\)/.test(navigator.userAgent);

    if (isWrappedWebView && navigator.storage && navigator.storage.persist) {
      const granted = await navigator.storage.persist();
      console.log('Persistent storage granted:', granted);
    }
  }

  // Check whether the model is already sitting in cache before deciding
  // whether to bother the person with a cellular-data warning at all.
  let alreadyCached = false;
  try {
    if (window.caches) {
      const keys = await caches.keys();
      alreadyCached = keys.some(k => k.toLowerCase().includes('webllm') || k.toLowerCase().includes('mlc'));
    }
  } catch (e) { /* cache check is best-effort */ }

  if (!isRecovery && !alreadyCached && isOnCellular()) {
    updateLoadingUI(0, '');
    const proceed = await askToContinueOnCellular();
    if (!proceed) {
      loadingDetail.textContent = "Paused — reopen this page once you're on wifi.";
      loadingPct.textContent = '';
      return false;
    }
  }

  updateLoadingUI(0, isRecovery ? 'Reloading model…' : (alreadyCached ? 'Loading cached model…' : 'Downloading model (first run only)…'));
  setStatus(isRecovery ? 'Reconnecting to model…' : 'Loading…', 'loading');

  try {
    // Always build a brand-new engine rather than calling engine.reload() —
    // on recovery the old engine's GPU device is the thing that died, so we
    // need a fresh WebGPU device underneath it, not just fresh weights.
    engine = await webllm.CreateMLCEngine(MODEL_ID, {
      initProgressCallback: (report) => {
        const pct = Math.round((report.progress || 0) * 100);
        updateLoadingUI(pct, report.text || ('Loading… ' + pct + '%'));
        setStatus(report.text || ('Loading… ' + pct + '%'), 'loading');
      }
    });

    hideOverlay();
    setStatus('Ready — running fully offline', 'ready');
    progressBar.style.width = '100%';
    inputField.disabled = false;
    inputField.placeholder = 'Message the AI…';
    sendBtn.disabled = false;
    if (isRecovery) {
      addMessage('system', 'Reconnected. (The on-device model briefly lost its GPU context — this usually happens if the app was backgrounded mid-reply. Your chat history is intact, just resend if the last reply didn\'t come through.)');
    } else {
      addMessage('system', 'Model loaded. Everything from here runs on-device, no internet needed.');
    }
    return true;
  } catch (err) {
    setStatus('Failed to load model', '');
    loadingDetail.textContent = 'Error: ' + err.message;
    loadingPct.textContent = '';
    console.error(err);
    return false;
  }
}

function init(){
  return loadModel(false);
}

// Streams a completion into aiDiv. MAX_REPLY_CHARS is a true ceiling — the
// returned text will never exceed it. Generation is allowed to run a bit
// past that ceiling internally (GENERATION_HEADROOM_CHARS) purely so we can
// detect the overshoot; once it happens, the visible reply rolls back to
// the last sentence that finished within budget, so it's always both
// within the limit and a complete thought. Only if no sentence completes
// within budget at all (one long run-on) does it fall back to a hard cut at
// a word boundary (rare).
async function streamReply(requestMessages, aiDiv){
  let full = '';
  let pendingFrame = null;
  let hardCut = false;

  const flush = () => {
    aiDiv.textContent = full || '…';
    scrollToBottom(false);
    pendingFrame = null;
  };

  const stream = await engine.chat.completions.create({
    messages: requestMessages,
    stream: true,
    temperature: 0.7,
    max_tokens: MAX_REPLY_TOKENS, // derived from MAX_REPLY_CHARS + headroom above so caps stay aligned
  });

  for await (const chunk of stream) {
    const delta = chunk.choices[0]?.delta?.content || '';
    full += delta;
    if (!pendingFrame) pendingFrame = requestAnimationFrame(flush);

    if (full.length > MAX_REPLY_CHARS) {
      try { engine.interruptGenerate(); } catch (e) { /* best-effort */ }
      const cutIdx = findLastSentenceEndWithin(full, MAX_REPLY_CHARS);
      if (cutIdx > 0) {
        full = full.slice(0, cutIdx).trimEnd();
      } else {
        // No sentence finished within budget at all — hard cut at the
        // nearest word boundary as a last resort.
        const lastSpace = full.lastIndexOf(' ', MAX_REPLY_CHARS);
        full = full.slice(0, lastSpace > 0 ? lastSpace : MAX_REPLY_CHARS).trimEnd();
        hardCut = true;
      }
      break;
    }
  }
  if (pendingFrame) cancelAnimationFrame(pendingFrame);

  if (hardCut) full += '…'; // the rare fallback case — genuinely incomplete
  aiDiv.textContent = full || '…';
  scrollToBottom(false);

  return full;
}

async function sendMessage(){
  const text = inputField.value.trim();
  if (!text || !engine) return;

  addMessage('user', text);
  history.push({ role: 'user', content: text });
  inputField.value = '';
  inputField.style.height = 'auto';
  sendBtn.disabled = true;
  inputField.disabled = true;

  const aiDiv = addMessage('ai', '…');

  isGenerating = true;
  try {
    const rawText = await streamReply(buildRequestMessages(), aiDiv);

    history.push({ role: 'assistant', content: rawText });
    // Only actually does work once history crosses the threshold — cheap
    // no-op otherwise. Awaited (rather than fire-and-forget) so it can't run
    // a second model call concurrently with whatever the user sends next.
    await condenseHistoryIfNeeded();
  } catch (err) {
    console.error(err);

    const msg = (err && err.message) || String(err);
    // These two signatures both mean the WebGPU device underneath the engine
    // died mid-generation (most often: the app/tab was backgrounded or the
    // screen locked while a reply was streaming). Once that happens the
    // engine object is unrecoverable — every future call fails with "Model
    // not loaded" even though nothing is technically wrong with the code
    // calling it. The fix is to drop the engine and rebuild it from scratch.
    const isDeviceLost = /mapAsync|unmapped before mapping|model not loaded/i.test(msg);

    if (isDeviceLost) {
      aiDiv.textContent = 'Lost connection to the on-device model — reloading…';
      isGenerating = false;
      engine = null;
      // Don't leave the failed reply in history — it never actually completed.
      if (history[history.length - 1]?.role === 'user') history.pop();
      sendBtn.disabled = true;
      inputField.disabled = true;
      await loadModel(true);
      inputField.focus();
      return;
    }

    aiDiv.textContent = 'Error: ' + msg;
  }

  isGenerating = false;
  sendBtn.disabled = false;
  inputField.disabled = false;
  inputField.focus();
}

sendBtn.addEventListener('click', sendMessage);
inputField.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
inputField.addEventListener('input', () => {
  inputField.style.height = 'auto';
  inputField.style.height = Math.min(inputField.scrollHeight, 100) + 'px';
});

init();
</script>
</body>
</html>
